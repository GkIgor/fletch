name: Flutter Build & Release

on:
  push:
    branches:
      - main
      - staging

permissions:
  contents: write

env:
  FLAVOR: ${{ github.ref_name == 'main' && 'prod' || 'staging' }}

jobs:
  build_windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows App
        run: flutter build windows --release --dart-define=FLAVOR=${{ env.FLAVOR }}
        env:
          FLAVOR: ${{ env.FLAVOR }}

      - name: Package Windows App
        shell: pwsh
        run: |
          if ("${{ env.FLAVOR }}" -ne "prod") {
            Rename-Item -Path build\windows\x64\runner\Release\fletch.exe -NewName fletch_${{ env.FLAVOR }}.exe
          }
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath fletch-windows-${{ env.FLAVOR }}.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: fletch-windows-${{ env.FLAVOR }}.zip

  build_linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux App
        run: flutter build linux --release --dart-define=FLAVOR=${{ env.FLAVOR }}
        env:
          FLAVOR: ${{ env.FLAVOR }}

      - name: Package Linux App
        run: |
          if [ "${{ env.FLAVOR }}" != "prod" ]; then
            rm -f build/linux/x64/release/bundle/fletch_${{ env.FLAVOR }}
            mv build/linux/x64/release/bundle/fletch build/linux/x64/release/bundle/fletch_${{ env.FLAVOR }}
          fi
          tar -czf fletch-linux-${{ env.FLAVOR }}.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: fletch-linux-${{ env.FLAVOR }}.tar.gz

  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build_windows, build_linux]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: .

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: .

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract version from pubspec.yaml
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          
          if [ "${{ env.FLAVOR }}" = "prod" ]; then
            TAG_NAME="v$VERSION"
            RELEASE_TITLE="Release $TAG_NAME"
            
            # Create production release
            gh release create "$TAG_NAME" \
              --title "$RELEASE_TITLE" \
              --notes "Official release of Fletch ($TAG_NAME) for Windows and Linux. Built from commit ${{ github.sha }}." \
              fletch-windows-prod.zip \
              fletch-linux-prod.tar.gz
          else
            TAG_NAME="v$VERSION-staging"
            RELEASE_TITLE="STAGING Release $TAG_NAME"
            
            # Delete any previous staging releases/tags to maintain only the latest one
            gh release list --limit 100 | grep -E '\-staging' | awk '{print $1}' | while read -r tag; do
              echo "Deleting previous staging release: $tag"
              gh release delete "$tag" --yes --cleanup-tag || true
            done
            
            # Create new staging release (marked as prerelease)
            gh release create "$TAG_NAME" \
              --prerelease \
              --title "$RELEASE_TITLE" \
              --notes "Automated staging build of Fletch ($TAG_NAME) for Windows and Linux. Built from commit ${{ github.sha }}." \
              fletch-windows-staging.zip \
              fletch-linux-staging.tar.gz
          fi
